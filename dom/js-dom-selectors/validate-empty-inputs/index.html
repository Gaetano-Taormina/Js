<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Validate Inputs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="p-4">
  <form id="myForm" class="w-50">
    <div class="mb-3">
      <input type="text" class="form-control required-input" placeholder="Name">
    </div>
    <div class="mb-3">
      <input type="email" class="form-control required-input" placeholder="Email">
    </div>
    <button type="submit" class="btn btn-primary">Submit</button>
  </form>
  <div id="errorMsg" class="alert alert-danger mt-3 w-50" style="display:none;">All fields are required!</div>
  <script src="assets/js/script.js"></script>
</body>
</html>
